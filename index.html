<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢検4級クエスト — 科学的ゲーミング学習</title>
<style>
  :root{
    --bg:#0d1022; --panel:#191f3a; --panel2:#232b4e; --line:#313c6b;
    --text:#eef1fb; --sub:#9aa5c9;
    --gold:#ffd166; --ok:#3ecf8e; --ng:#f7616f; --crit:#ff9f43;
    --accent1:#5b7cfa; --accent2:#a45bfa;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    background:radial-gradient(1200px 600px at 50% -100px,#1c2450,var(--bg));
    color:var(--text); min-height:100vh;
  }
  #app{max-width:540px;margin:0 auto;padding:16px 16px 96px;}
  h1{font-size:21px} h2{font-size:17px;margin-bottom:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:10px}
  .grow{flex:1}
  .sub{color:var(--sub);font-size:13px;line-height:1.7}
  .big{font-size:26px;font-weight:800}
  .gold{color:var(--gold)}
  button{font-family:inherit;border:none;border-radius:14px;cursor:pointer;font-size:16px;font-weight:700;color:var(--text);}
  .btn-main{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent1),var(--accent2));
    box-shadow:0 6px 20px rgba(90,110,250,.35);margin-top:8px;}
  .btn-main:active{transform:scale(.98)}
  .btn-boss{background:linear-gradient(135deg,#f75f6d,#a43bcf);box-shadow:0 6px 20px rgba(230,70,120,.35)}
  .btn-sub{width:100%;padding:13px;background:var(--panel2);border:1px solid var(--line);margin-top:8px;}
  .btn-ghost{background:none;color:var(--sub);font-size:14px;padding:8px;font-weight:600}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;background:var(--panel2);border:1px solid var(--line)}
  .xpbar{height:12px;background:#0a0d1c;border-radius:99px;overflow:hidden;border:1px solid var(--line)}
  .xpbar>div{height:100%;background:linear-gradient(90deg,#ffd166,#ff9f43);transition:width .5s}
  .mbar{height:8px;background:#0a0d1c;border-radius:99px;overflow:hidden}
  .mbar>div{height:100%;background:linear-gradient(90deg,#3ecf8e,#4f8ef7);transition:width .5s}
  /* battle */
  .enemy-zone{text-align:center;padding:8px 0 4px}
  .enemy-emoji{font-size:64px;display:inline-block;transition:transform .15s;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
  .enemy-emoji.hit{transform:scale(.82) rotate(-8deg);filter:drop-shadow(0 0 14px rgba(255,209,102,.9))}
  .enemy-emoji.attack{transform:scale(1.18) translateY(6px)}
  .hpbar{height:14px;background:#0a0d1c;border-radius:99px;overflow:hidden;border:1px solid var(--line);margin-top:6px}
  .hpbar>div{height:100%;background:linear-gradient(90deg,#f75f6d,#ff9f43);transition:width .4s}
  .hearts{font-size:20px;letter-spacing:2px}
  .combo{font-weight:900;color:var(--crit);font-size:15px;min-height:20px;text-align:center}
  .dmg{position:absolute;font-weight:900;font-size:26px;color:var(--gold);pointer-events:none;
    animation:dmgfly .8s forwards;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  @keyframes dmgfly{0%{opacity:0;transform:translateY(10px) scale(.6)}25%{opacity:1;transform:translateY(-6px) scale(1.15)}100%{opacity:0;transform:translateY(-42px) scale(1)}}
  .qcat{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1px}
  .qtext{font-size:19px;font-weight:700;line-height:1.8;margin:10px 0 16px}
  .qtext .tgt{color:var(--gold);border-bottom:2px solid var(--gold);padding:0 2px}
  .choice{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:10px;
    background:var(--panel2);border:2px solid var(--line);border-radius:14px;font-size:17px;font-weight:600;line-height:1.5;}
  .choice:active{transform:scale(.99)}
  .choice.correct{border-color:var(--ok);background:rgba(62,207,142,.15)}
  .choice.wrong{border-color:var(--ng);background:rgba(247,97,111,.15)}
  .choice.dim{opacity:.4}
  .feedback{border-radius:14px;padding:14px;margin-top:4px;font-size:14px;line-height:1.8;animation:pop .25s}
  .feedback.ok{background:rgba(62,207,142,.12);border:1px solid var(--ok)}
  .feedback.ng{background:rgba(247,97,111,.12);border:1px solid var(--ng)}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .progress{height:10px;background:#0a0d1c;border-radius:99px;overflow:hidden;margin:8px 0 4px}
  .progress>div{height:100%;background:linear-gradient(90deg,#3ecf8e,#4f8ef7);transition:width .3s}
  input[type=text]{width:100%;padding:14px;border-radius:14px;border:2px solid var(--line);
    background:var(--panel2);color:var(--text);font-size:18px;font-weight:700;font-family:inherit;margin-bottom:10px}
  input[type=text]:focus{outline:none;border-color:var(--accent1)}
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,16,34,.95);border-top:1px solid var(--line);backdrop-filter:blur(8px);z-index:10;}
  nav .inner{max-width:540px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;padding:10px 4px 14px;font-size:11px;color:var(--sub);font-weight:600}
  nav button.active{color:var(--gold)}
  nav .ico{display:block;font-size:20px;margin-bottom:2px}
  .badge{display:flex;gap:12px;align-items:center;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;padding:12px;margin-bottom:10px;}
  .badge.locked{opacity:.38;filter:grayscale(1)}
  .badge .bemoji{font-size:30px}
  .cat-btn{display:flex;align-items:center;gap:10px;width:100%;padding:13px 14px;margin-bottom:8px;
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;text-align:left;font-size:15px;font-weight:700}
  .streak-flame{font-size:34px;filter:drop-shadow(0 0 8px rgba(255,160,60,.6))}
  .timer{font-weight:900;font-size:18px;color:var(--gold)}
  .timer.warn{color:var(--ng);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.4}}
  .levelup{position:fixed;inset:0;background:rgba(10,12,28,.88);z-index:50;display:flex;
    align-items:center;justify-content:center;flex-direction:column;animation:pop .3s}
  .levelup .lv{font-size:56px;font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(255,209,102,.8)}
  .science{border-left:3px solid var(--ok);padding-left:12px;margin-bottom:14px}
  .science b{color:var(--gold)}
  table.result{width:100%;border-collapse:collapse;font-size:13px}
  table.result td{padding:8px 4px;border-bottom:1px solid var(--line);line-height:1.6;vertical-align:top}
</style>
</head>
<body>
<div id="app"></div>
<nav><div class="inner" id="navbar"></div></nav>

<script>
"use strict";
/* ============================================================
   漢検4級クエスト
   科学的根拠のある学習法をゲームに組み込んだ漢検4級対策アプリ
   ・想起練習(テスト効果): 全問クイズ形式 / 読みは入力モードあり
   ・間隔反復(分散学習): ライトナー式 1→3→7→14日で自動復習
   ・交互練習: 「今日の特訓」は9分野をシャッフル出題
   ・即時フィードバック: 全問に解説つき
   ============================================================ */

/* ---------- 出題分野(実際の漢検4級の大問構成に対応) ---------- */
const CATS = [
  {id:"yomi",  label:"漢字の読み",     emoji:"📖", weight:4},
  {id:"kaki",  label:"書き取り",       emoji:"✍️", weight:3},
  {id:"douon", label:"同音・同訓異字", emoji:"👂", weight:3},
  {id:"bushu", label:"部首",           emoji:"🧩", weight:2},
  {id:"kousei",label:"熟語の構成",     emoji:"🏗️", weight:2},
  {id:"taigi", label:"対義語・類義語", emoji:"⚖️", weight:2},
  {id:"okuri", label:"送りがな",       emoji:"🎯", weight:1},
  {id:"yoji",  label:"四字熟語",       emoji:"🀄", weight:2},
  {id:"goji",  label:"誤字訂正",       emoji:"🔍", weight:1},
];

/* ---------- 問題データ ----------
   q: 問題文(【】が対象語) / c: 選択肢 / a: 正解のindex / exp: 解説
   yomi は input:true (入力モード対応。かんたんモードでは4択) ---------- */
const QUESTIONS = [
/* ===== 読み ===== */
{cat:"yomi", q:"【濃霧】で視界が悪い。", input:true, ans:"のうむ", c:["のうむ","のうきり","もうむ","こいむ"], a:0, exp:"濃霧(のうむ)=濃い霧。「濃」は4級の漢字。"},
{cat:"yomi", q:"証拠品を【押収】する。", input:true, ans:"おうしゅう", c:["おうしゅう","おしゅう","こうしゅう","あっしゅう"], a:0, exp:"押収(おうしゅう)=証拠品などを取り上げること。"},
{cat:"yomi", q:"新入生を【歓迎】する。", input:true, ans:"かんげい", c:["かんげい","がんげい","けいげい","かんむかえ"], a:0, exp:"歓迎(かんげい)=喜んで迎えること。"},
{cat:"yomi", q:"会場が【沈黙】に包まれた。", input:true, ans:"ちんもく", c:["ちんもく","じんもく","ちんこく","しずもく"], a:0, exp:"沈黙(ちんもく)=黙りこむこと。「沈」も「黙」も4級。"},
{cat:"yomi", q:"自然の【驚異】に感動する。", input:true, ans:"きょうい", c:["きょうい","けいい","ぎょうい","きょうき"], a:0, exp:"驚異(きょうい)=驚くほどすばらしいこと。「脅威」との書き分けにも注意。"},
{cat:"yomi", q:"台風の【影響】で電車が遅れた。", input:true, ans:"えいきょう", c:["えいきょう","えいこう","ようきょう","かげひび"], a:0, exp:"影響(えいきょう)。「影」も「響」も4級の頻出漢字。"},
{cat:"yomi", q:"専門家に調査を【依頼】する。", input:true, ans:"いらい", c:["いらい","えらい","いたく","きらい"], a:0, exp:"依頼(いらい)=人に頼むこと。"},
{cat:"yomi", q:"健康を【維持】するため毎日走る。", input:true, ans:"いじ", c:["いじ","ゆいじ","いち","たもち"], a:0, exp:"維持(いじ)=保ち続けること。"},
{cat:"yomi", q:"【濁流】が橋を押し流した。", input:true, ans:"だくりゅう", c:["だくりゅう","にごりゅう","たくりゅう","どりゅう"], a:0, exp:"濁流(だくりゅう)=濁った激しい流れ。"},
{cat:"yomi", q:"盛大な【拍手】が起こった。", input:true, ans:"はくしゅ", c:["はくしゅ","ひょうしゅ","はくて","ぱくしゅ"], a:0, exp:"拍手(はくしゅ)。「拍」は4級。「拍子(ひょうし)」の読みも要注意。"},
{cat:"yomi", q:"【峠】の茶屋でひと休みする。", input:true, ans:"とうげ", c:["とうげ","みね","さか","がけ"], a:0, exp:"峠(とうげ)=山道の一番高い所。日本で作られた国字。"},
{cat:"yomi", q:"【芝生】の上で弁当を食べる。", input:true, ans:"しばふ", c:["しばふ","しばお","さぼく","しせい"], a:0, exp:"芝生(しばふ)は特別な読み方(熟字訓)。"},
{cat:"yomi", q:"スマートフォンが【普及】する。", input:true, ans:"ふきゅう", c:["ふきゅう","ふきょう","ほきゅう","ふっきゅう"], a:0, exp:"普及(ふきゅう)=広く行き渡ること。"},
{cat:"yomi", q:"【脂肪】を減らす運動をする。", input:true, ans:"しぼう", c:["しぼう","しほう","あぶら","しぼー"], a:0, exp:"脂肪(しぼう)。「脂」も「肪」も4級。"},
{cat:"yomi", q:"【突然】、雨が降り出した。", input:true, ans:"とつぜん", c:["とつぜん","とうぜん","こうぜん","くうぜん"], a:0, exp:"突然(とつぜん)=急に。「突」は4級。"},
{cat:"yomi", q:"【舞台】に立つ夢をかなえる。", input:true, ans:"ぶたい", c:["ぶたい","まいだい","ぶだい","まいたい"], a:0, exp:"舞台(ぶたい)。「舞」は4級。部首は「舛(まいあし)」。"},
{cat:"yomi", q:"公園の【噴水】の前で待ち合わせる。", input:true, ans:"ふんすい", c:["ふんすい","ほんすい","ばくすい","ふきみず"], a:0, exp:"噴水(ふんすい)。「噴火」「噴出」も同じ「噴」。"},
{cat:"yomi", q:"【冒険】小説に夢中になる。", input:true, ans:"ぼうけん", c:["ぼうけん","もうけん","ぼうげん","ほうけん"], a:0, exp:"冒険(ぼうけん)=危険をおかして行うこと。"},
{cat:"yomi", q:"【迫力】ある映像に息をのむ。", input:true, ans:"はくりょく", c:["はくりょく","ひゃくりょく","はくりき","きんりょく"], a:0, exp:"迫力(はくりょく)。「迫る(せまる)」の訓読みもセットで覚えよう。"},
{cat:"yomi", q:"地球の【環境】を守る活動に参加する。", input:true, ans:"かんきょう", c:["かんきょう","かんけい","わっきょう","けんきょう"], a:0, exp:"環境(かんきょう)。「環」は4級。「輪」の意味を持つ。"},
{cat:"yomi", q:"刃物を安全に【扱う】。", input:true, ans:"あつかう", c:["あつかう","あやつる","ふるう","つかう"], a:0, exp:"扱う(あつかう)。4級の訓読み頻出語。"},
{cat:"yomi", q:"記者から【鋭い】質問が飛んだ。", input:true, ans:"するどい", c:["するどい","かしこい","はやい","にぶい"], a:0, exp:"鋭い(するどい)。対義語は「鈍い(にぶい)」。どちらも4級。"},
{cat:"yomi", q:"大きな荷物を両手で【抱える】。", input:true, ans:"かかえる", c:["かかえる","ささえる","たずさえる","こしらえる"], a:0, exp:"抱える(かかえる)。「抱く(だく/いだく)」の読み分けも出る。"},
{cat:"yomi", q:"川の水が【澄んで】いて底まで見える。", input:true, ans:"すんで", c:["すんで","とんで","くんで","にじんで"], a:0, exp:"澄む(すむ)=にごりがなく清らか。対義語は「濁る」。"},
{cat:"yomi", q:"世界でも【珍しい】切手を集める。", input:true, ans:"めずらしい", c:["めずらしい","うつくしい","いちじるしい","このましい"], a:0, exp:"珍しい(めずらしい)。「珍品」「珍味」の「珍」。"},

/* ===== 書き取り ===== */
{cat:"kaki", q:"敵の城を【コウゲキ】する。", c:["攻撃","交撃","攻激","巧撃"], a:0, exp:"攻撃。「攻」は攵(ぼくづくり)ではなく工+攵。対義語は「防御」。"},
{cat:"kaki", q:"全力で選手を【オウエン】する。", c:["応援","応縁","央援","応演"], a:0, exp:"応援。「援」は「援助」「救援」でも使う。"},
{cat:"kaki", q:"【カンパイ】の音頭をとる。", c:["乾杯","乾配","感杯","完杯"], a:0, exp:"乾杯=杯(さかずき)を乾(ほ)すという意味。"},
{cat:"kaki", q:"森の【オク】へと進んでいく。", c:["奥","憶","億","屋"], a:0, exp:"奥。「奥地」「奥義」でも使う。部首は「大」。"},
{cat:"kaki", q:"台風で大きな【ヒガイ】を受けた。", c:["被害","彼害","疲害","披害"], a:0, exp:"被害。「被」「彼」「疲」は形が似ているので注意!"},
{cat:"kaki", q:"【シンチョウ】に行動する。", c:["慎重","深重","真重","慎調"], a:0, exp:"慎重=注意深いこと。「身長」「新調」と同音なので文脈で判断。"},
{cat:"kaki", q:"日差しが強いので【ボウシ】をかぶる。", c:["帽子","冒子","棒子","忙子"], a:0, exp:"帽子。「冒険」の冒、「棒」と混同しやすい。巾(はばへん)がつく。"},
{cat:"kaki", q:"敵の陣地を【ホウイ】する。", c:["包囲","抱囲","砲囲","方囲"], a:0, exp:"包囲=まわりを取り囲むこと。「抱」(かかえる)との書き分けに注意。"},
{cat:"kaki", q:"強敵に【イド】む。", c:["挑む","跳む","逃む","桃む"], a:0, exp:"挑む(いどむ)。「挑戦」の挑。「跳」「逃」「桃」は同じ「兆」を持つ仲間。"},
{cat:"kaki", q:"ゴールまでの【キョリ】を測る。", c:["距離","巨離","距理","拠離"], a:0, exp:"距離。「距」は足へん。「巨大」の巨と区別。"},
{cat:"kaki", q:"【シンケン】な表情で話を聞く。", c:["真剣","真険","真検","新剣"], a:0, exp:"真剣=本気。もともとは本物の剣のこと。「危険」「点検」と使い分け。"},
{cat:"kaki", q:"遠くで【カミナリ】が鳴っている。", c:["雷","雪","霧","震"], a:0, exp:"雷(かみなり)。雨かんむり+田。「雷鳴」「落雷」でも使う。"},
{cat:"kaki", q:"感動して【ナミダ】があふれた。", c:["涙","波","泣","液"], a:0, exp:"涙(なみだ)。さんずい+戻。「感涙」でも使う。"},
{cat:"kaki", q:"警察が犯人を【ツイセキ】する。", c:["追跡","追積","追績","追席"], a:0, exp:"追跡=あとを追うこと。「跡」は足へん。「積」「績」との使い分け頻出!"},
{cat:"kaki", q:"古い部品を新品と【コウカン】する。", c:["交換","交歓","交感","好感"], a:0, exp:"交換=取りかえること。「交歓」は打ち解けて楽しむこと。文脈で判断。"},
{cat:"kaki", q:"【ハデ】な服装で登場する。", c:["派手","波手","破手","葉手"], a:0, exp:"派手。対義語は「地味」。「派」は「流派」「立派」でも使う。"},
{cat:"kaki", q:"【トウメイ】な液体を観察する。", c:["透明","通明","投明","党明"], a:0, exp:"透明。「透」は「透ける(すける)」とも読む。"},
{cat:"kaki", q:"【ムチュウ】でゲームをしていた。", c:["夢中","霧中","無中","夢注"], a:0, exp:"夢中。「五里霧中(ごりむちゅう)」の霧中と間違えやすいので注意!"},
{cat:"kaki", q:"【シバイ】を見に劇場へ行く。", c:["芝居","芝井","柴居","司会"], a:0, exp:"芝居(しばい)。昔、芝の上に座って見たことから。"},
{cat:"kaki", q:"やり方に【マヨ】ったら基本に戻る。", c:["迷","謎","迷よ","眠"], a:0, exp:"迷う。「迷惑」「迷路」の迷。送りがなは「迷う」。"},

/* ===== 同音・同訓異字 ===== */
{cat:"douon", q:"彼の意見を【シジ】する。", c:["支持","指示","師事","私事"], a:0, exp:"支持=賛成して応援すること。「指示」は命令・さしず。"},
{cat:"douon", q:"先生の【シジ】に従って行動する。", c:["指示","支持","師事","四時"], a:0, exp:"指示=さしずすること。「支持」との使い分けは超頻出!"},
{cat:"douon", q:"身長を【ハカ】る。", c:["測る","計る","量る","図る"], a:0, exp:"長さ・深さは「測る」、時間・数は「計る」、重さ・体積は「量る」。"},
{cat:"douon", q:"タイムを【ハカ】る。", c:["計る","測る","量る","謀る"], a:0, exp:"時間・数を数えるのは「計る」。時計の「計」と覚えよう。"},
{cat:"douon", q:"小麦粉の重さを【ハカ】る。", c:["量る","計る","測る","図る"], a:0, exp:"重さ・体積は「量る」。「計量カップ」をイメージ。"},
{cat:"douon", q:"かぜが【ナオ】る。", c:["治る","直る","修る","療る"], a:0, exp:"病気・けがは「治る」、機械や誤りは「直る」。"},
{cat:"douon", q:"自転車の故障が【ナオ】る。", c:["直る","治る","戻る","修る"], a:0, exp:"物の故障・誤りは「直る」。病気は「治る」。"},
{cat:"douon", q:"窓を【ア】けて空気を入れかえる。", c:["開ける","空ける","明ける","揚ける"], a:0, exp:"閉じたものをひらくのは「開ける」。"},
{cat:"douon", q:"夜が【ア】けて朝になる。", c:["明ける","開ける","空ける","飽ける"], a:0, exp:"夜明け・年明けは「明ける」。"},
{cat:"douon", q:"席を【ア】けて待つ。", c:["空ける","開ける","明ける","挙ける"], a:0, exp:"からにする・すきまを作るのは「空ける」。"},
{cat:"douon", q:"【イガイ】な結果に驚いた。", c:["意外","以外","遺外","案外"], a:0, exp:"意外=思いのほか。「以外」は「〜をのぞく」の意味。"},
{cat:"douon", q:"関係者【イガイ】は立入禁止だ。", c:["以外","意外","位外","医外"], a:0, exp:"以外=それをのぞく他のもの。「意外」と混同しない!"},
{cat:"douon", q:"兄弟なのに【タイショウ】的な性格だ。", c:["対照","対象","対称","大将"], a:0, exp:"対照=くらべたときの違いが際立つこと。「対照的」はこれ。"},
{cat:"douon", q:"左右【タイショウ】の図形をかく。", c:["対称","対照","対象","大賞"], a:0, exp:"対称=つりあっていること。「線対称・点対称」は数学でも登場。"},
{cat:"douon", q:"中学生を【タイショウ】に調査する。", c:["対象","対称","対照","大正"], a:0, exp:"対象=はたらきかける相手・目標。"},
{cat:"douon", q:"事故の責任を【ツイキュウ】する。", c:["追及","追求","追究","追級"], a:0, exp:"追及=責任などを問いつめる。「及」は「およぶ」。"},
{cat:"douon", q:"理想の生き方を【ツイキュウ】する。", c:["追求","追及","追究","墜求"], a:0, exp:"追求=手に入れようと追い求める。利益・理想・幸福など。"},
{cat:"douon", q:"宇宙の真理を【ツイキュウ】する。", c:["追究","追求","追及","対究"], a:0, exp:"追究=学問的に深く調べきわめる。研究の「究」。"},
{cat:"douon", q:"重大なあやまちを【オカ】す。", c:["犯す","冒す","侵す","推す"], a:0, exp:"罪・ミスは「犯す」。犯罪の犯。"},
{cat:"douon", q:"危険を【オカ】して救助に向かう。", c:["冒す","犯す","侵す","押す"], a:0, exp:"あえて危険なことをするのは「冒す」。冒険の冒!"},
{cat:"douon", q:"他国の領土を【オカ】す。", c:["侵す","犯す","冒す","越す"], a:0, exp:"領域にふみこむのは「侵す」。侵入・侵略の侵。"},
{cat:"douon", q:"劇の【カンシュウ】が拍手を送った。", c:["観衆","慣習","監修","感収"], a:0, exp:"観衆=見物する大勢の人。「慣習」はならわし、「監修」は編集の監督。"},

/* ===== 部首 ===== */
{cat:"bushu", q:"「疲」の部首はどれ?", c:["疒(やまいだれ)","广(まだれ)","皮(けがわ)","冫(にすい)"], a:0, exp:"疲・痛・病など、体の状態を表す字は疒(やまいだれ)。"},
{cat:"bushu", q:"「闘」の部首はどれ?", c:["門(もんがまえ)","豆(まめ)","寸(すん)","王(おう)"], a:0, exp:"闘の部首は門(もんがまえ)。中の「豆+寸」は音や意味を補う部分。"},
{cat:"bushu", q:"「街」の部首はどれ?", c:["行(ぎょうがまえ)","土(つち)","圭(けい)","彳(ぎょうにんべん)"], a:0, exp:"街は「行」の間に「圭」が入った形。部首は行(ぎょうがまえ・ゆきがまえ)。"},
{cat:"bushu", q:"「載」の部首はどれ?", c:["車(くるま)","戈(ほこづくり)","土(つち)","十(じゅう)"], a:0, exp:"載(のせる)の部首は車。「積載」「連載」など車に関係する意味から。"},
{cat:"bushu", q:"「奥」の部首はどれ?", c:["大(だい)","米(こめ)","冂(けいがまえ)","一(いち)"], a:0, exp:"奥の部首は「大」。意外な部首として頻出!"},
{cat:"bushu", q:"「疑」の部首はどれ?", c:["疋(ひき)","匕(さじ)","矢(や)","子(こ)"], a:0, exp:"疑の部首は疋(ひき)。これも意外な部首の代表格。"},
{cat:"bushu", q:"「監」の部首はどれ?", c:["皿(さら)","臣(しん)","目(め)","血(ち)"], a:0, exp:"監の部首は皿。盆・盛・盗なども皿が部首。"},
{cat:"bushu", q:"「響」の部首はどれ?", c:["音(おと)","郷(さと)","幺(いとがしら)","日(ひ)"], a:0, exp:"響(ひびく)の部首は音。音に関係する意味だから。"},
{cat:"bushu", q:"「恐」の部首はどれ?", c:["心(こころ)","工(たくみ)","凡(ぼん)","丶(てん)"], a:0, exp:"恐の部首は心。感情を表す字は心・忄(りっしんべん)が多い。"},
{cat:"bushu", q:"「敷」の部首はどれ?", c:["攵(ぼくづくり)","方(ほう)","田(た)","寸(すん)"], a:0, exp:"敷の部首は攵(ぼくづくり・のぶん)。攻・敵・敗も同じ。"},
{cat:"bushu", q:"「壁」の部首はどれ?", c:["土(つち)","尸(しかばね)","口(くち)","辛(からい)"], a:0, exp:"壁の部首は土。壁は土で作るから。「癖」は疒なので注意。"},
{cat:"bushu", q:"「膚」の部首はどれ?", c:["肉(にく)","虍(とらがしら)","田(た)","疒(やまいだれ)"], a:0, exp:"膚(はだ)の部首は肉。体に関する字だから。意外な部首として出題される。"},
{cat:"bushu", q:"「雑」の部首はどれ?", c:["隹(ふるとり)","木(き)","九(きゅう)","亠(なべぶた)"], a:0, exp:"雑の部首は隹(ふるとり)。難・離・雄なども隹。"},
{cat:"bushu", q:"「歓」の部首はどれ?", c:["欠(あくび)","隹(ふるとり)","矢(や)","口(くち)"], a:0, exp:"歓の部首は欠(あくび・かける)。歌・欲も同じ部首。"},
{cat:"bushu", q:"「戒」の部首はどれ?", c:["戈(ほこづくり)","廾(にじゅうあし)","十(じゅう)","一(いち)"], a:0, exp:"戒(いましめる)の部首は戈(ほこ)。戦いに関係する字。"},
{cat:"bushu", q:"「隠」の部首はどれ?", c:["阝(こざとへん)","爫(つめかんむり)","心(こころ)","ヨ(けいがしら)"], a:0, exp:"隠の部首は阝(こざとへん)。左側の阝はこざとへん、右側は「おおざと」。"},
{cat:"bushu", q:"「趣」の部首はどれ?", c:["走(そうにょう)","取(とる)","耳(みみ)","又(また)"], a:0, exp:"趣の部首は走(そうにょう)。起・越・超も同じ。"},
{cat:"bushu", q:"「霧」の部首はどれ?", c:["雨(あめかんむり)","矛(ほこ)","攵(ぼくづくり)","力(ちから)"], a:0, exp:"霧の部首は雨。雷・雲・露など天気の字は雨かんむり。"},
{cat:"bushu", q:"「舞」の部首はどれ?", c:["舛(まいあし)","無(なし)","夕(ゆうべ)","亠(なべぶた)"], a:0, exp:"舞の部首は舛(まいあし)。かなりの難問。出たらラッキー問題!"},

{cat:"kousei", q:"「脱帽」の構成は?", c:KOUSEI_C(), a:3, exp:"「帽子を脱ぐ」。下が上の目的語(エ)。"},

/* ===== 対義語・類義語 ===== */
{cat:"taigi", q:"対義語:「需要」⇔「供□」。□に入る漢字は?", c:["給","求","級","究"], a:0, exp:"需要⇔供給。社会科でも必出のペア。"},
{cat:"taigi", q:"対義語:「起床」⇔「就□」。□に入る漢字は?", c:["寝","眠","床","泊"], a:0, exp:"起床⇔就寝。「寝」は4級の漢字。"},

{cat:"taigi", q:"対義語:「故意」⇔「過□」。□に入る漢字は?", c:["失","質","疾","室"], a:0, exp:"故意(わざと)⇔過失(うっかり)。法律でも使う対義語。"},

{cat:"taigi", q:"類義語:「突然」=「不□」。□に入る漢字は?", c:["意","易","井","惑"], a:0, exp:"突然=不意。「不意打ち」の不意。"},
{cat:"taigi", q:"類義語:「近隣」=「近□」。□に入る漢字は?", c:["所","場","接","辺"], a:0, exp:"近隣=近所。「隣」は「となり」。"},
{cat:"taigi", q:"類義語:「不満」=「不□」。□に入る漢字は?", c:["服","復","福","副"], a:0, exp:"不満=不服。納得できないこと。"},
{cat:"taigi", q:"対義語:「拡大」⇔「□小」。□に入る漢字は?", c:["縮","宿","粛","短"], a:0, exp:"拡大⇔縮小。基本の対義語ペア。"},
{cat:"taigi", q:"類義語:「値段」=「価□」。□に入る漢字は?", c:["格","確","客","額"], a:0, exp:"値段=価格。「価」はあたい。"},

{cat:"okuri", q:"作品にそっと手を【フレル】。正しい書き方は?", c:["触れる","振れる","触る","觸れる"], a:0, exp:"触れる(ふれる)。「触る」は「さわる」と読む。"},
{cat:"okuri", q:"大声で【サケブ】。正しい書き方は?", c:["叫ぶ","叫けぶ","号ぶ","呼ぶ"], a:0, exp:"叫ぶ。「叫けぶ」としないこと。"},
{cat:"okuri", q:"突然の知らせに【オドロク】。正しい書き方は?", c:["驚く","驚ろく","驚どろく","脅く"], a:0, exp:"驚く。「驚ろく」は誤り。"},
{cat:"okuri", q:"敵から【ニゲル】。正しい書き方は?", c:["逃げる","逃る","逃ける","迷げる"], a:0, exp:"逃げる。「逃す(のがす)」「逃れる(のがれる)」の読み分けも出る。"},
{cat:"okuri", q:"兄を【タヨル】。正しい書き方は?", c:["頼る","頼よる","便る","依る"], a:0, exp:"頼る。「頼もしい」「頼む」も送りがな注意。"},
{cat:"okuri", q:"洗濯物がよく【カワク】。正しい書き方は?", c:["乾く","乾わく","干く","燥く"], a:0, exp:"乾く。「乾杯」「乾燥」の乾。"},
{cat:"okuri", q:"駅で客を【ムカエル】。正しい書き方は?", c:["迎える","迎かえる","向える","迎る"], a:0, exp:"迎える。「迎かえる」は誤り。歓迎の迎。"},
{cat:"okuri", q:"【コワイ】映画を見る。正しい書き方は?", c:["怖い","怖わい","恐い","布い"], a:0, exp:"怖い。「恐い」は常用漢字表にない書き方なので漢検では×。"},
{cat:"okuri", q:"金品を【ヌスム】。正しい書き方は?", c:["盗む","盗すむ","塗む","次む"], a:0, exp:"盗む。「盗難」「強盗」の盗。"},
{cat:"okuri", q:"地図に【クワシイ】。正しい書き方は?", c:["詳しい","詳わしい","詳くしい","精しい"], a:0, exp:"詳しい。「詳細」の詳。「精しい」は常用漢字表にない読み。"},
{cat:"okuri", q:"【アヤシイ】人影を見た。正しい書き方は?", c:["怪しい","怪やしい","妖しい","怪い"], a:0, exp:"怪しい。「怪談」「怪獣」の怪。"},
{cat:"okuri", q:"別れを【オシム】。正しい書き方は?", c:["惜しむ","惜む","惜ししむ","借しむ"], a:0, exp:"惜しむ。「惜敗」の惜。「借」と形が似ているので注意。"},

/* ===== 四字熟語 ===== */

{cat:"yoji", q:"一心不□(一つのことに集中する)。□は?", c:["乱","欄","覧","卵"], a:0, exp:"一心不乱(いっしんふらん)。心が乱れないこと。"},

/* ---------- SRS (ライトナー式間隔反復) ----------
   box 0..4 / 復習間隔: 当日,1日,3日,7日,14日 */
const INTERVALS = [0,1,3,7,14];
const DAY = 24*60*60*1000;
function srsOf(id){ return S.srs[id] || null; }
function srsCorrect(id){
  const r = S.srs[id] || {box:-1};
  const box = Math.min(4, (r.box<0?0:r.box)+1);
  S.srs[id] = {box, due: Date.now() + INTERVALS[box]*DAY};
}
function srsWrong(id){
  S.srs[id] = {box:0, due: Date.now()};  /* 間違えたら箱1に戻して当日再出題 */
}
function dueQuestions(){
  const now = Date.now();
  return QUESTIONS.filter(q=>{ const r=srsOf(q.id); return r && r.due<=now; });
}
function unseenQuestions(){ return QUESTIONS.filter(q=>!srsOf(q.id)); }

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* 今日の特訓: 復習期限が来た問題を最優先 → 新規 → 期限が近いもの。分野はシャッフル(交互練習) */
function pickDaily(n){
  let pool = shuffle(dueQuestions()).slice(0,n);
  if(pool.length<n) pool = pool.concat(shuffle(unseenQuestions()).slice(0, n-pool.length));
  if(pool.length<n){
    const rest = QUESTIONS.filter(q=>!pool.includes(q)).sort((a,b)=>(srsOf(a.id).due)-(srsOf(b.id).due));
    pool = pool.concat(rest.slice(0, n-pool.length));
  }
  return shuffle(pool);
}
function pickCat(cat, n){
  const inCat = QUESTIONS.filter(q=>q.cat===cat);
  const now = Date.now();
  let pool = shuffle(inCat.filter(q=>{const r=srsOf(q.id); return r&&r.due<=now;})).slice(0,n);
  if(pool.length<n) pool = pool.concat(shuffle(inCat.filter(q=>!srsOf(q.id))).slice(0,n-pool.length));
  if(pool.length<n){
    const rest = inCat.filter(q=>!pool.includes(q)).sort((a,b)=>(srsOf(a.id).box)-(srsOf(b.id).box));
    pool = pool.concat(rest.slice(0,n-pool.length));
  }
  return shuffle(pool);
}
/* 模擬試験: 本番の配点比率でサンプリング */
function pickMock(n){
  const totalW = CATS.reduce((s,c)=>s+c.weight,0);
  let picked=[];
  CATS.forEach(c=>{
    const k = Math.max(1, Math.round(n*c.weight/totalW));
    picked = picked.concat(shuffle(QUESTIONS.filter(q=>q.cat===c.id)).slice(0,k));
  });
  return shuffle(picked).slice(0,n);
}

/* ---------- サウンド (WebAudio) ---------- */
let AC=null;
function beep(freq,dur,type="square",vol=.15,delay=0){
  if(!S.sound) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, AC.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(.001, AC.currentTime+delay+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(AC.currentTime+delay); o.stop(AC.currentTime+delay+dur);
  }catch(e){}
}

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function bumpStreak(){
  const today = todayStr();
  if(S.lastDay===today) return;
  const y=new Date(Date.now()-DAY);
  const yesterday = y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  S.streak = (S.lastDay===yesterday) ? S.streak+1 : 1;
  S.lastDay = today;
}

  <p class="sub" style="text-align:center;padding:0 8px">※本アプリは非公式の学習教材です。「漢検」は日本漢字能力検定協会の登録商標です。<a href="javascript:void(0)" onclick="nav('science')" style="color:var(--sub)">くわしく</a></p>`;
}

/* ---------- 分野修行 ---------- */
function renderCats(){
  app.innerHTML = `
  <h1 style="margin-bottom:12px">🗡️ 分野別修行</h1>
  <p class="sub" style="margin-bottom:12px">漢検4級の大問構成に対応した9分野。苦手な敵を集中攻撃しよう(8問バトル)。</p>
  ${CATS.map((c,i)=>{
    const st=S.catStats[c.id]||{ok:0,ng:0};
    const total=st.ok+st.ng;
    const e=ENEMIES[i%ENEMIES.length];
    return `<button class="cat-btn" onclick="startCat('${c.id}')">
      <span style="font-size:26px">${e.emoji}</span>
      <span class="grow">${c.emoji} ${c.label}<br><span class="sub" style="font-weight:400">${e.name} / ${total?`正答率 ${Math.round(100*st.ok/total)}%`:"未挑戦"}</span></span>
      <span>▶</span>
    </button>`;
  }).join("")}`;
}

/* ---------- バトル開始 ---------- */
function newBattle(qs, opts){
  return Object.assign({
    qs, i:0, hp:qs.length, playerHp:3, combo:0, maxCombo:0,
    correct:0, wrong:0, wrongList:[], xpGain:0,
    enemy: ENEMIES[Math.floor(Math.random()*ENEMIES.length)],
    mock:false, timeLeft:0, done:false, answered:false, win:false,
  }, opts||{});
}
function startDaily(){ B=newBattle(pickDaily(10)); screen="battle"; render(); }
function startCat(cat){
  if(!S.catsPlayed.includes(cat)) S.catsPlayed.push(cat);
  const i=CATS.findIndex(c=>c.id===cat);
  B=newBattle(pickCat(cat,8), {enemy:ENEMIES[i%ENEMIES.length]});
  screen="battle"; render();
}
function startMock(){
  B=newBattle(pickMock(20), {enemy:BOSS, mock:true, timeLeft:600});
  screen="battle"; render();
  mockTimer=setInterval(()=>{
    if(!B||B.done){stopTimer();return;}
    B.timeLeft--;
    const el=document.getElementById("timer");
    if(el){ el.textContent=fmtTime(B.timeLeft); if(B.timeLeft<=60) el.classList.add("warn"); }
    if(B.timeLeft<=0){ stopTimer(); endBattle(); }
  },1000);
}
function fmtTime(s){ return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

/* ---------- バトル画面 ---------- */
function catLabel(id){ const c=CATS.find(c=>c.id===id); return c.emoji+" "+c.label; }
function renderBattle(){
  const q=B.qs[B.i];
  const useInput = q.input && S.inputMode;
  const hpPct=Math.max(0,100*(B.qs.length-B.correct)/B.qs.length);
  app.innerHTML = `
  <div class="row" style="margin-bottom:4px">
    <button class="btn-ghost" onclick="nav('home')">← 逃げる</button>
    <div class="grow"></div>
    ${B.mock?`<span class="timer" id="timer">${fmtTime(B.timeLeft)}</span>`:""}
  </div>
  <div class="card" style="position:relative;overflow:visible">
    <div class="enemy-zone">
      <span class="enemy-emoji" id="enemy">${B.enemy.emoji}</span>
      <div style="font-weight:800;margin-top:2px">${B.enemy.name}</div>
      <div class="sub">${B.enemy.flavor}</div>
      <div class="hpbar"><div id="ehp" style="width:${hpPct}%"></div></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="hearts">${"❤️".repeat(B.playerHp)}${"🖤".repeat(Math.max(0,3-B.playerHp))}</div>
      <div class="grow combo" id="combo">${B.combo>=2?B.combo+" COMBO!":""}</div>
      <div class="sub">${B.i+1} / ${B.qs.length}</div>
    </div>
    <div class="progress"><div style="width:${100*B.i/B.qs.length}%"></div></div>
  </div>

  <div class="card">
    <div class="qcat">${catLabel(q.cat)}</div>
    <div class="qtext">${q.q.replace(/【(.+?)】/g,'<span class="tgt">$1</span>')}</div>
    <div id="answers">
    ${useInput
      ? `<input type="text" id="inp" placeholder="ひらがなで入力" autocomplete="off" onkeydown="if(event.key==='Enter')submitInput()">
         <button class="btn-main" onclick="submitInput()">⚡ 攻撃!</button>
         <button class="btn-ghost" style="width:100%" onclick="giveUpInput()">わからない…(答えを見る)</button>`
      : shuffledChoices(q).map(ci=>
         `<button class="choice" onclick="answer(${ci})">${q.c[ci]}</button>`).join("")
    }
    </div>
    <div id="fb"></div>
  </div>`;
  if(useInput){ const el=document.getElementById("inp"); if(el) el.focus(); }
}
/* 選択肢の表示順をシャッフル(正解位置の偏り防止)。バトルごとに並び直す。
   熟語の構成はア〜オの並びを固定 */
function shuffledChoices(q){
  if(q.cat==="kousei") return q.c.map((_,i)=>i);
  B.orders = B.orders||{};
  if(!B.orders[q.id]) B.orders[q.id] = shuffle(q.c.map((_,i)=>i));
  return B.orders[q.id];
}
function normalizeKana(s){
  return (s||"").trim()
    .replace(/[ァ-ヶ]/g, ch=>String.fromCharCode(ch.charCodeAt(0)-0x60))
    .replace(/\s/g,"");
}
function submitInput(){
  if(B.answered) return;
  const v=normalizeKana(document.getElementById("inp").value);
  if(!v) return;
  judge(v===normalizeKana(B.qs[B.i].ans), v);
}
function giveUpInput(){ if(!B.answered) judge(false, "(無回答)"); }
function answer(ci){
  if(B.answered) return;
  const q=B.qs[B.i];
  judge(ci===q.a, ci);
}

function judge(ok, given){
  B.answered=true;
  const q=B.qs[B.i];
  const st=S.catStats[q.cat]=S.catStats[q.cat]||{ok:0,ng:0};
  S.totalAnswered++;
  const enemy=document.getElementById("enemy");
  if(ok){
    B.correct++; B.combo++; B.maxCombo=Math.max(B.maxCombo,B.combo);
    S.totalCorrect++; st.ok++;
    if(q.input && S.inputMode) S.inputCorrect++;
    srsCorrect(q.id);
    const crit=B.combo>=3;
    let xp = B.mock?15:10;
    xp += Math.min(10, 2*(B.combo-1));
    if(q.input && S.inputMode) xp=Math.round(xp*1.5);
    B.xpGain+=xp;
    crit?sfx.crit():sfx.ok();
    if(enemy){
      enemy.classList.add("hit"); setTimeout(()=>enemy.classList.remove("hit"),200);
      const d=document.createElement("span"); d.className="dmg";
      d.textContent=crit?"CRITICAL!":"+"+xp+" XP";
      d.style.left=(40+Math.random()*30)+"%"; d.style.top="30px";
      enemy.parentElement.appendChild(d);
    }
    document.getElementById("ehp").style.width=Math.max(0,100*(B.qs.length-B.correct)/B.qs.length)+"%";
    showFb(true, q, xp, crit);
  }else{
    B.wrong++; B.combo=0; st.ng++;
    B.wrongList.push(q);
    srsWrong(q.id);
    if(!B.mock) B.playerHp--;
    sfx.ng();
    if(enemy){ enemy.classList.add("attack"); setTimeout(()=>enemy.classList.remove("attack"),250); }
    showFb(false, q, 0, false);
  }
  save();
}
function correctText(q){ return q.input ? q.ans+"("+q.c[q.a]+")" : q.c[q.a]; }
function showFb(ok,q,xp,crit){
  const last = (B.i+1>=B.qs.length) || (!B.mock && B.playerHp<=0 && !ok);
  document.getElementById("fb").innerHTML = `
    <div class="feedback ${ok?"ok":"ng"}">
      <b>${ok?(crit?"🔥 会心の一撃! +"+xp+"XP":"⚔️ 攻撃ヒット! +"+xp+"XP"):"💢 敵の反撃を受けた!"}</b><br>
      ${ok?"":"正解: <b>"+ (q.input? q.ans : q.c[q.a]) +"</b><br>"}
      ${q.exp}
    </div>
    <button class="btn-main" onclick="next()">${last?"結果を見る":"つぎへ ▶"}</button>`;
  /* 選択肢に正誤の色をつける */
  document.querySelectorAll(".choice").forEach((el)=>{
    const txt=el.textContent;
    if(txt===q.c[q.a]) el.classList.add("correct");
    else if(!ok) el.classList.add("dim");
    el.disabled=true;
  });
}
function next(){
  B.answered=false;
  if((!B.mock && B.playerHp<=0) || B.i+1>=B.qs.length){ endBattle(); return; }
  B.i++;
  render();
}

/* ---------- バトル終了 ---------- */
function endBattle(){
  stopTimer();
  if(B.done){ screen="result"; render(); return; }  /* 二重呼び出し防止 */
  B.done=true;
  const rate = B.qs.length? B.correct/B.qs.length : 0;
  if(B.mock){
    B.win = rate>=0.7;
    if(B.win){ S.bossCleared++; }
    S.bossBest=Math.max(S.bossBest,B.correct);
  }else{
    B.win = B.playerHp>0;
  }
  const beforeLv=levelFromXp(S.xp);
  S.xp+=B.xpGain;
  const afterLv=levelFromXp(S.xp);
  bumpStreak();
  newBadges=[];
  checkBadges(B);
  save();
  B.win?sfx.win():sfx.lose();
  screen="result"; render();
  if(afterLv>beforeLv){
    sfx.levelup();
    const div=document.createElement("div");
    div.className="levelup";
    div.innerHTML=`<div class="lv">LEVEL UP!</div><div class="big gold">Lv.${afterLv} ${titleFor(afterLv)}</div>
      <button class="btn-main" style="width:200px;margin-top:20px" onclick="this.parentElement.remove()">つづける</button>`;
    document.body.appendChild(div);
  }
}

function renderResult(){
  const rate=Math.round(100*B.correct/B.qs.length);
  app.innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:56px">${B.win?(B.mock?"👑":"🎉"):"💀"}</div>
    <h1>${B.win?(B.mock?"魔王討伐!! 合格ライン突破!":"バトル勝利!"):(B.mock?"魔王は強かった…":"力尽きた…")}</h1>
    <p class="sub" style="margin-top:6px">${B.mock?`本番の合格ラインは正答率70%。今回は <b class="gold">${rate}%</b>!`:B.enemy.name+"とのバトル結果"}</p>
    <div class="row" style="margin-top:14px;text-align:center">
      <div class="grow"><div class="big" style="color:var(--ok)">${B.correct}</div><div class="sub">正解</div></div>
      <div class="grow"><div class="big" style="color:var(--ng)">${B.wrong}</div><div class="sub">ミス</div></div>
      <div class="grow"><div class="big" style="color:var(--crit)">${B.maxCombo}</div><div class="sub">最大コンボ</div></div>
      <div class="grow"><div class="big gold">+${B.xpGain}</div><div class="sub">XP</div></div>
    </div>
  </div>
  ${newBadges.length?`<div class="card"><h2>🏅 新バッジ獲得!</h2>${newBadges.map(b=>`<div class="badge"><span class="bemoji">${b.emoji}</span><div><b>${b.name}</b><div class="sub">${b.desc}</div></div></div>`).join("")}</div>`:""}
  ${B.wrongList.length?`<div class="card">
    <h2>📝 まちがい直し(ここが伸びしろ!)</h2>
    <p class="sub">間違えた問題は今日もう一度、そのあと1→3→7→14日後に自動で再出題されるぞ。</p>
    <table class="result">${B.wrongList.map(q=>`<tr><td>${q.q.replace(/【(.+?)】/g,"<b>$1</b>")}</td><td style="white-space:nowrap"><b class="gold">${q.input?q.ans:q.c[q.a]}</b></td></tr>`).join("")}</table>
  </div>`:""}
  <button class="btn-main" onclick="nav('home')">ホームへ戻る</button>
  ${B.wrongList.length?`<button class="btn-sub" onclick="retryWrong()">😤 まちがえた${B.wrongList.length}問にリベンジ</button>`:""}`;
}
function retryWrong(){
  const qs=shuffle(B.wrongList);
  B=newBattle(qs);
  screen="battle"; render();
}

/* ---------- バッジ ---------- */
function renderBadges(){
  app.innerHTML = `
  <h1 style="margin-bottom:12px">🏅 バッジコレクション <span class="pill">${S.badges.length}/${BADGES.length}</span></h1>
  ${BADGES.map(b=>`
    <div class="badge ${S.badges.includes(b.id)?"":"locked"}">
      <span class="bemoji">${b.emoji}</span>
      <div><b>${b.name}</b><div class="sub">${b.desc}</div></div>
    </div>`).join("")}`;
}
